name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Path filters: only run jobs when their trees change ──
  #
  # Separation of concerns:
  #   apps/web     → meeting product UI (embedded in Go binary / Docker)
  #   apps/site    → landing + public docs (GitHub Pages only)
  #   docs/        → repo/developer markdown (not the binary). If ONLY this
  #                  changes, run nothing except site/landing deploy path.
  #   server/      → Go API; site rebuilds too (copies server/docs/swagger.json)
  #
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      web: ${{ steps.filter.outputs.web }}
      site: ${{ steps.filter.outputs.site }}
      android: ${{ steps.filter.outputs.android }}
      desktop: ${{ steps.filter.outputs.desktop }}
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
              - '.github/workflows/ci.yml'
            web:
              - 'apps/web/**'
              - '.github/workflows/ci.yml'
            # Landing + public docs only. Includes root docs/ so docs-only pushes
            # still refresh the site path when relevant, without building products.
            site:
              - 'apps/site/**'
              - 'docs/**'
              - 'server/docs/**'
              - 'server/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/deploy-site.yml'
            android:
              - 'apps/android/**'
              - '.github/workflows/ci.yml'
            desktop:
              - 'apps/desktop/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            ios:
              - 'apps/ios/**'
              - '.github/workflows/ci.yml'

  # ── Server (Go) ───────────────────────────────────────────────
  server:
    name: Server – Build & Vet
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: server/go.sum
      - run: go mod download
      # Create placeholders for //go:embed directives
      - run: mkdir -p frontend && touch frontend/.gitkeep
      - run: mkdir -p internal/livekit/bin && touch internal/livekit/bin/livekit-server
      - run: go vet ./...
      - run: go build ./...

  server-test:
    name: Server – Tests
    runs-on: ubuntu-latest
    needs: [changes, server]
    if: needs.changes.outputs.server == 'true'
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: server/go.sum
      - run: go mod download
      - run: mkdir -p frontend && touch frontend/.gitkeep
      - run: mkdir -p internal/livekit/bin && touch internal/livekit/bin/livekit-server
      - run: go test -race -count=1 ./...

  # ── Web (React meeting app — embedded in binary) ──────────────
  web:
    name: Web – Build & Check
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run build

  # ── Android ───────────────────────────────────────────────────
  android:
    name: Android – Lint & Test
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.5.0"

      - name: Generate Gradle Wrapper jar
        run: gradle wrapper --gradle-version 9.5.0

      - run: ./gradlew lint
      - run: ./gradlew testDebugUnitTest
      - run: ./gradlew assembleDebug bundleDebug

      - name: Upload universal APK
        uses: actions/upload-artifact@v7
        with:
          name: android-apk-universal
          path: apps/android/app/build/outputs/apk/debug/app-universal-debug.apk
          retention-days: 7

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v7
        with:
          name: android-apk-arm64-v8a
          path: apps/android/app/build/outputs/apk/debug/app-arm64-v8a-debug.apk
          retention-days: 7

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v7
        with:
          name: android-apk-armeabi-v7a
          path: apps/android/app/build/outputs/apk/debug/app-armeabi-v7a-debug.apk
          retention-days: 7

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v7
        with:
          name: android-apk-x86_64
          path: apps/android/app/build/outputs/apk/debug/app-x86_64-debug.apk
          retention-days: 7

      - name: Upload debug bundle (AAB)
        uses: actions/upload-artifact@v7
        with:
          name: android-bundle-debug
          path: apps/android/app/build/outputs/bundle/debug/app-debug.aab
          retention-days: 7

  # ── iOS ───────────────────────────────────────────────────────
  ios:
    name: iOS – Build & Test
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/ios
    steps:
      - uses: actions/checkout@v7

      - name: Cache Swift packages
        uses: actions/cache@v6
        with:
          path: apps/ios/.spm-cache
          key: ios-spm-${{ hashFiles('apps/ios/Bedrud.xcodeproj/project.pbxproj') }}
          restore-keys: ios-spm-

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Bedrud.xcodeproj \
            -scheme Bedrud \
            -clonedSourcePackagesDirPath .spm-cache

      - name: Build for testing with coverage
        run: |
          xcodebuild build-for-testing \
            -project Bedrud.xcodeproj \
            -scheme Bedrud \
            -destination "platform=iOS Simulator,name=iPhone 17 Pro" \
            -clonedSourcePackagesDirPath .spm-cache \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Run tests with coverage
        run: |
          xcodebuild test-without-building \
            -project Bedrud.xcodeproj \
            -scheme Bedrud \
            -destination "platform=iOS Simulator,name=iPhone 17 Pro" \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Generate coverage report
        run: |
          xcrun xccov view --report TestResults.xcresult | tee coverage-report.txt

      - name: Calculate coverage percentage
        id: coverage
        run: |
          # Extract line coverage from xccov report
          COVERAGE=$(xcrun xccov view --report --json TestResults.xcresult | jq -r '.targets[0].lineCoverage * 100 | floor')
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

          # Create summary
          echo "## iOS Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Line Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files with low coverage (<50%)" >> $GITHUB_STEP_SUMMARY
          xcrun xccov view --report --json TestResults.xcresult | \
            jq -r '.targets[].files[] | select(.lineCoverage < 0.5) | "\(.path): \(.lineCoverage * 100 | floor)% coverage"' >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ios-coverage-report
          path: apps/ios/coverage-report.txt
          retention-days: 30

  # ── Desktop (Rust/Slint) ──────────────────────────────────────
  desktop:
    name: Desktop – Build & Test
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - name: Install Slint dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libgles2-mesa-dev \
            libegl1-mesa-dev \
            libdbus-1-dev \
            libsecret-1-dev \
            libasound2-dev
      - name: Build
        run: cargo build -p bedrud-desktop
      - name: Test
        run: cargo test -p bedrud-desktop

  # ── Site (Astro landing + public docs) ─────────────────────────
  # Not part of the Go binary / Docker image.
  # If ONLY docs/ (or apps/site) changes, this is the only product-ish job that runs.
  site:
    name: Site – Build & Check
    needs: changes
    if: needs.changes.outputs.site == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/site
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true
      - run: bun install --frozen-lockfile
      - name: Sync swagger.json from server
        run: mkdir -p public && cp ../../server/docs/swagger.json public/swagger.json
      - run: bun run check
      - run: bun run typecheck:astro
      - run: bun run build
